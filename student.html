<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ученик - Кибер Кахут</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Share Tech Mono', monospace;
            background: #0a0a0a;
            color: #0f0;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            width: 100%;
            max-width: 500px;
            background: rgba(0, 255, 0, 0.05);
            backdrop-filter: blur(20px);
            border: 2px solid #0f0;
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 0 50px rgba(0, 255, 0, 0.2);
        }
        
        .screen { display: none; }
        .screen.active { display: block; }
        
        h1 { 
            font-size: 2rem; 
            text-align: center; 
            margin-bottom: 30px;
            color: #0f0;
            text-shadow: 0 0 20px #0f0;
        }
        
        .logo { 
            font-size: 60px; 
            text-align: center; 
            margin-bottom: 20px;
            filter: drop-shadow(0 0 20px #0f0);
        }
        
        input {
            width: 100%;
            padding: 18px;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid #0f0;
            border-radius: 16px;
            color: #0f0;
            font-size: 1.2rem;
            font-family: 'Share Tech Mono', monospace;
            margin: 10px 0;
        }
        
        input:focus {
            outline: none;
            box-shadow: 0 0 30px #0f0;
        }
        
        .btn {
            width: 100%;
            padding: 18px;
            background: rgba(0, 255, 0, 0.1);
            border: 2px solid #0f0;
            border-radius: 16px;
            color: #0f0;
            font-size: 1.2rem;
            font-family: 'Share Tech Mono', monospace;
            cursor: pointer;
            margin: 10px 0;
            transition: all 0.3s;
        }
        
        .btn:hover {
            background: rgba(0, 255, 0, 0.2);
            box-shadow: 0 0 30px #0f0;
            transform: translateY(-2px);
        }
        
        .info-box {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #0f0;
            border-radius: 16px;
            padding: 20px;
            margin: 20px 0;
        }
        
        .info-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(0, 255, 0, 0.2);
        }
        
        .info-item:last-child {
            border-bottom: none;
        }
        
        .question-header {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #0f0;
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
        }
        
        .question-text {
            font-size: 1.5rem;
            margin: 30px 0;
            text-align: center;
            line-height: 1.5;
        }
        
        .options {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin: 30px 0;
        }
        
        .option {
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid #0f0;
            border-radius: 16px;
            padding: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 20px;
            transition: all 0.3s;
        }
        
        .option:hover {
            background: rgba(0, 255, 0, 0.1);
            box-shadow: 0 0 20px #0f0;
            transform: translateX(5px);
        }
        
        .option.selected {
            background: rgba(0, 255, 0, 0.2);
            border-color: #fff;
        }
        
        .option-letter {
            width: 40px;
            height: 40px;
            background: #0f0;
            color: black;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 1.2rem;
        }
        
        .status {
            text-align: center;
            padding: 20px;
            margin-top: 20px;
            border-radius: 16px;
            font-size: 1.2rem;
            font-weight: bold;
        }
        
        .status.correct { 
            background: rgba(0, 255, 0, 0.2);
            border: 1px solid #0f0;
            color: #0f0;
        }
        
        .status.wrong { 
            background: rgba(255, 0, 0, 0.2);
            border: 1px solid #ff4444;
            color: #ff4444;
        }
        
        .status.waiting {
            background: rgba(255, 255, 0, 0.1);
            border: 1px solid yellow;
            color: yellow;
        }
        
        .error {
            background: rgba(255, 0, 0, 0.2);
            border: 1px solid #ff0000;
            color: #ff0000;
            padding: 12px;
            border-radius: 12px;
            margin: 10px 0;
            text-align: center;
        }
        
        .loader {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(0, 255, 0, 0.3);
            border-top: 3px solid #0f0;
            border-radius: 50%;
            margin: 20px auto;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .player-stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 20px 0;
            font-size: 1.1rem;
        }
        
        .player-stats span {
            color: #0f0;
            font-weight: bold;
            font-size: 1.3rem;
        }
        
        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }
            
            h1 {
                font-size: 1.6rem;
            }
            
            .question-text {
                font-size: 1.2rem;
            }
            
            .option {
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="joinScreen" class="screen active">
            <div class="logo">🛡️</div>
            <h1>КИБЕР КАХУТ</h1>
            <div id="errorContainer"></div>
            <input type="text" id="playerName" placeholder="Твоё имя" maxlength="15">
            <input type="text" id="gameCode" placeholder="Код викторины" maxlength="8">
            <button id="joinButton" class="btn">🔌 ПОДКЛЮЧИТЬСЯ</button>
            <a href="/" class="btn" style="text-align: center;">← На главную</a>
        </div>

        <div id="waitingScreen" class="screen">
            <div class="logo">⏳</div>
            <h2 style="text-align: center;">ОЖИДАНИЕ...</h2>
            <div class="loader"></div>
            <div class="info-box">
                <div class="info-item"><span>Участник:</span> <strong id="displayName">-</strong></div>
                <div class="info-item"><span>Код:</span> <strong id="displayCode">-</strong></div>
                <div class="info-item"><span>Очки:</span> <strong id="displayScore">0</strong></div>
            </div>
            <button onclick="leaveGame()" class="btn">🚪 ВЫЙТИ</button>
        </div>

        <div id="questionScreen" class="screen">
            <div class="question-header">
                <span>КИБЕРБЕЗОПАСНОСТЬ</span>
                <span id="questionCounter">1/30</span>
            </div>
            <div class="question-text" id="questionText">Загрузка...</div>
            <div class="options" id="optionsContainer"></div>
            <div class="status waiting" id="answerStatus">⏳ Выбери ответ</div>
        </div>
    </div>

    <script>
        let currentGameId = null;
        let playerName = null;
        let currentQuestion = null;
        let hasAnswered = false;

        const joinScreen = document.getElementById('joinScreen');
        const waitingScreen = document.getElementById('waitingScreen');
        const questionScreen = document.getElementById('questionScreen');
        const joinButton = document.getElementById('joinButton');
        const errorContainer = document.getElementById('errorContainer');
        const playerNameInput = document.getElementById('playerName');
        const gameCodeInput = document.getElementById('gameCode');
        const displayName = document.getElementById('displayName');
        const displayCode = document.getElementById('displayCode');
        const displayScore = document.getElementById('displayScore');
        const questionText = document.getElementById('questionText');
        const optionsContainer = document.getElementById('optionsContainer');
        const answerStatus = document.getElementById('answerStatus');
        const questionCounter = document.getElementById('questionCounter');

        function showError(msg) {
            errorContainer.innerHTML = `<div class="error">${msg}</div>`;
            setTimeout(() => errorContainer.innerHTML = '', 3000);
        }

        function switchScreen(screen) {
            [joinScreen, waitingScreen, questionScreen].forEach(s => s.classList.remove('active'));
            document.getElementById(screen + 'Screen').classList.add('active');
        }

        window.joinGame = function() {
            const name = playerNameInput.value.trim();
            const code = gameCodeInput.value.trim();
            
            if (!name || name.length < 2) return showError("Введите имя");
            if (!code || code.length !== 8) return showError("Введите 8 цифр кода");
            
            playerName = name;
            currentGameId = "game_" + code;
            
            displayName.textContent = playerName;
            displayCode.textContent = code;
            switchScreen('waiting');
        };

        window.leaveGame = function() {
            currentGameId = null;
            playerName = null;
            switchScreen('join');
            playerNameInput.value = '';
            gameCodeInput.value = '';
        };

        joinButton.addEventListener('click', joinGame);
    </script>
</body>
</html>
