<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ученик - Кибер Кахут</title>
    <style>
        body {
            background: #0a0a0a;
            color: #0f0;
            font-family: 'Courier New', monospace;
            padding: 20px;
        }
        
        .container {
            max-width: 400px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            margin-bottom: 30px;
        }
        
        input, button {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background: #000;
            color: #0f0;
            border: 2px solid #0f0;
            border-radius: 10px;
            font-size: 1rem;
        }
        
        button {
            background: #0f0;
            color: #000;
            font-weight: bold;
            cursor: pointer;
        }
        
        button:hover {
            box-shadow: 0 0 30px #0f0;
        }
        
        .error {
            color: red;
            text-align: center;
            margin: 10px 0;
        }
        
        .success {
            color: #0f0;
            text-align: center;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧑‍🎓 Ученик</h1>
        
        <input type="text" id="playerName" placeholder="Твоё имя">
        <input type="text" id="gameCode" placeholder="Код игры">
        <button onclick="joinGame()">🔌 ПОДКЛЮЧИТЬСЯ</button>
        
        <div id="message"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://gluqnmznmjvlyguzkdrn.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_OUdy33oOIQlOce88IXAP9w_G74CkWr_';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        window.joinGame = async function() {
            const name = document.getElementById('playerName').value.trim();
            const code = document.getElementById('gameCode').value.trim();
            const msgDiv = document.getElementById('message');
            
            if (!name || !code) {
                msgDiv.innerHTML = '<div class="error">Введите имя и код</div>';
                return;
            }
            
            try {
                // Проверяем игру
                const { data: game, error: gameError } = await supabase
                    .from('games')
                    .select('*')
                    .eq('code', code)
                    .single();
                
                if (gameError || !game) {
                    msgDiv.innerHTML = '<div class="error">Игра не найдена</div>';
                    return;
                }
                
                // Добавляем игрока
                const { error: insertError } = await supabase
                    .from('players')
                    .insert({
                        game_code: code,
                        name: name,
                        score: 0,
                        answered: false,
                        joined_at: Date.now()
                    });
                
                if (insertError) {
                    msgDiv.innerHTML = '<div class="error">Игрок с таким именем уже есть</div>';
                    return;
                }
                
                msgDiv.innerHTML = '<div class="success">✅ Подключено! Ждите...</div>';
                
            } catch (e) {
                msgDiv.innerHTML = '<div class="error">Ошибка подключения</div>';
            }
        };
    </script>
</body>
</html>
