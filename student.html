<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ученик - Кибер Кахут</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Share Tech Mono', monospace;
            background: #0a0a0a;
            color: #0f0;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            width: 100%;
            max-width: 500px;
            background: rgba(0, 255, 0, 0.05);
            backdrop-filter: blur(20px);
            border: 2px solid #0f0;
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 0 50px rgba(0, 255, 0, 0.2);
        }
        
        .screen { display: none; }
        .screen.active { display: block; }
        
        h1 { 
            font-size: 2rem; 
            text-align: center; 
            margin-bottom: 30px;
            color: #0f0;
            text-shadow: 0 0 20px #0f0;
        }
        
        .logo { 
            font-size: 60px; 
            text-align: center; 
            margin-bottom: 20px;
            filter: drop-shadow(0 0 20px #0f0);
        }
        
        input {
            width: 100%;
            padding: 18px;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid #0f0;
            border-radius: 16px;
            color: #0f0;
            font-size: 1.2rem;
            font-family: 'Share Tech Mono', monospace;
            margin: 10px 0;
        }
        
        input:focus {
            outline: none;
            box-shadow: 0 0 30px #0f0;
        }
        
        .btn {
            width: 100%;
            padding: 18px;
            background: rgba(0, 255, 0, 0.1);
            border: 2px solid #0f0;
            border-radius: 16px;
            color: #0f0;
            font-size: 1.2rem;
            font-family: 'Share Tech Mono', monospace;
            cursor: pointer;
            margin: 10px 0;
            transition: all 0.3s;
        }
        
        .btn:hover {
            background: rgba(0, 255, 0, 0.2);
            box-shadow: 0 0 30px #0f0;
            transform: translateY(-2px);
        }
        
        .info-box {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #0f0;
            border-radius: 16px;
            padding: 20px;
            margin: 20px 0;
        }
        
        .info-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(0, 255, 0, 0.2);
        }
        
        .info-item:last-child {
            border-bottom: none;
        }
        
        .question-header {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #0f0;
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
        }
        
        .question-text {
            font-size: 1.5rem;
            margin: 30px 0;
            text-align: center;
            line-height: 1.5;
        }
        
        .options {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin: 30px 0;
        }
        
        .option {
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid #0f0;
            border-radius: 16px;
            padding: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 20px;
            transition: all 0.3s;
        }
        
        .option:hover {
            background: rgba(0, 255, 0, 0.1);
            box-shadow: 0 0 20px #0f0;
            transform: translateX(5px);
        }
        
        .option.selected {
            background: rgba(0, 255, 0, 0.2);
            border-color: #fff;
        }
        
        .option-letter {
            width: 40px;
            height: 40px;
            background: #0f0;
            color: black;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 1.2rem;
        }
        
        .status {
            text-align: center;
            padding: 20px;
            margin-top: 20px;
            border-radius: 16px;
            font-size: 1.2rem;
            font-weight: bold;
        }
        
        .status.correct { 
            background: rgba(0, 255, 0, 0.2);
            border: 1px solid #0f0;
            color: #0f0;
        }
        
        .status.wrong { 
            background: rgba(255, 0, 0, 0.2);
            border: 1px solid #ff4444;
            color: #ff4444;
        }
        
        .status.waiting {
            background: rgba(255, 255, 0, 0.1);
            border: 1px solid yellow;
            color: yellow;
        }
        
        .error {
            background: rgba(255, 0, 0, 0.2);
            border: 1px solid #ff0000;
            color: #ff0000;
            padding: 12px;
            border-radius: 12px;
            margin: 10px 0;
            text-align: center;
        }
        
        .loader {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(0, 255, 0, 0.3);
            border-top: 3px solid #0f0;
            border-radius: 50%;
            margin: 20px auto;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }
            
            h1 {
                font-size: 1.6rem;
            }
            
            .question-text {
                font-size: 1.2rem;
            }
            
            .option {
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- ЭКРАН ВХОДА -->
        <div id="joinScreen" class="screen active">
            <div class="logo">🛡️</div>
            <h1>КИБЕР КАХУТ</h1>
            <div id="errorContainer"></div>
            <input type="text" id="playerName" placeholder="Твоё имя" maxlength="15">
            <input type="text" id="gameCode" placeholder="Код викторины" maxlength="8">
            <button id="joinButton" class="btn">🔌 ПОДКЛЮЧИТЬСЯ</button>
            <a href="index.html" class="btn" style="text-align: center;">← На главную</a>
        </div>

        <!-- ЭКРАН ОЖИДАНИЯ -->
        <div id="waitingScreen" class="screen">
            <div class="logo">⏳</div>
            <h2 style="text-align: center;">ОЖИДАНИЕ...</h2>
            <div class="loader"></div>
            <div class="info-box">
                <div class="info-item">
                    <span>Участник:</span>
                    <strong id="displayName">-</strong>
                </div>
                <div class="info-item">
                    <span>Код:</span>
                    <strong id="displayCode">-</strong>
                </div>
                <div class="info-item">
                    <span>Очки:</span>
                    <strong id="displayScore">0</strong>
                </div>
            </div>
            <button onclick="leaveGame()" class="btn">🚪 ВЫЙТИ</button>
        </div>

        <!-- ЭКРАН ВОПРОСА -->
        <div id="questionScreen" class="screen">
            <div class="question-header">
                <span>КИБЕРБЕЗОПАСНОСТЬ</span>
                <span id="questionCounter">1/30</span>
            </div>
            <div class="question-text" id="questionText">Загрузка...</div>
            <div class="options" id="optionsContainer"></div>
            <div class="status waiting" id="answerStatus">⏳ Выбери ответ</div>
        </div>
    </div>

    <script>
        // Используем ДРУГОЕ имя для Supabase клиента
        const SB = window.supabase.createClient(
            'https://gluqnmznmjvlyguzkdrn.supabase.co',
            'sb_publishable_OUdy33oOIQlOce88IXAP9w_G74CkWr_'
        );
        
        console.log('🚀 Supabase инициализирован');

        // ========== ВОПРОСЫ ==========
        const QUESTIONS = [
            {
                id: 1,
                text: "Что такое фишинг?",
                options: [
                    "Вид рыбалки",
                    "Метод кражи данных через поддельные сайты/письма",
                    "Антивирусная программа",
                    "Тип шифрования"
                ],
                correct: 1,
                points: 1
            },
            {
                id: 2,
                text: "Какой пароль считается самым ненадежным?",
                options: [
                    "G7$k2!mN9",
                    "Tr0ub4dor&3",
                    "qwerty123",
                    "P@ssw0rd!$"
                ],
                correct: 2,
                points: 1
            },
            {
                id: 3,
                text: "Что такое 2FA?",
                options: [
                    "Второй аккаунт",
                    "Двухфакторная аутентификация",
                    "Файловая система",
                    "Тип вируса"
                ],
                correct: 1,
                points: 1
            },
            {
                id: 4,
                text: "Что такое VPN?",
                options: [
                    "Вирусная программа",
                    "Виртуальная частная сеть",
                    "Тип пароля",
                    "Антивирус"
                ],
                correct: 1,
                points: 1
            },
            {
                id: 5,
                text: "Какой сайт помогает проверить, не взломали ли ваш email?",
                options: [
                    "google.com",
                    "haveibeenpwned.com",
                    "yandex.ru",
                    "github.com"
                ],
                correct: 1,
                points: 1
            },
            {
                id: 6,
                text: "Что такое вредоносное ПО?",
                options: [
                    "Программа для учебы",
                    "Вирусы, трояны, шпионы",
                    "Антивирус",
                    "Браузер"
                ],
                correct: 1,
                points: 1
            },
            {
                id: 7,
                text: "Что такое социальная инженерия?",
                options: [
                    "Инженерия в соцсетях",
                    "Психологическое манипулирование людьми",
                    "Строительство соцобъектов",
                    "Тип шифрования"
                ],
                correct: 1,
                points: 1
            },
            {
                id: 8,
                text: "Как часто нужно обновлять ПО?",
                options: [
                    "Раз в год",
                    "Никогда",
                    "Как только выходят обновления",
                    "Только когда перестает работать"
                ],
                correct: 2,
                points: 1
            },
            {
                id: 9,
                text: "Что такое публичный Wi-Fi?",
                options: [
                    "Домашняя сеть",
                    "Открытая сеть в кафе, аэропортах",
                    "Спутниковый интернет",
                    "Проводной интернет"
                ],
                correct: 1,
                points: 1
            },
            {
                id: 10,
                text: "Что такое антивирус?",
                options: [
                    "Программа для ускорения ПК",
                    "Программа для защиты от вирусов",
                    "Браузер",
                    "Операционная система"
                ],
                correct: 1,
                points: 1
            },
            {
                id: 11,
                text: "Почему опасно использовать один и тот же пароль на разных сайтах?",
                options: [
                    "Его сложнее запомнить",
                    "Если взломают один сайт, хакеры получат доступ ко всем вашим аккаунтам",
                    "Сайты могут поссориться",
                    "Это запрещено законом"
                ],
                correct: 1,
                points: 2
            },
            {
                id: 12,
                text: "Что такое цифровой след?",
                options: [
                    "Отпечаток пальца для входа в телефон",
                    "Вся информация, которую вы оставляете о себе в интернете",
                    "След от мышки на коврике",
                    "Программа для слежки"
                ],
                correct: 1,
                points: 2
            },
            {
                id: 13,
                text: "Что такое кибербуллинг?",
                options: [
                    "Взлом сайта",
                    "Травля и оскорбления в интернете",
                    "Вирус в компьютере",
                    "Соревнования по киберспорту"
                ],
                correct: 1,
                points: 2
            },
            {
                id: 14,
                text: "Что такое бэкап и зачем он нужен?",
                options: [
                    "Резервная копия данных, чтобы не потерять файлы",
                    "Программа для ускорения игр",
                    "Удаление вирусов",
                    "Новый смартфон"
                ],
                correct: 0,
                points: 2
            },
            {
                id: 15,
                text: "Что такое публичный Wi-Fi и чем он опасен?",
                options: [
                    "Домашний интернет, он безопасен",
                    "Бесплатный интернет в кафе и аэропортах, где могут украсть ваши данные",
                    "Спутниковый интернет",
                    "Проводной интернет от провайдера"
                ],
                correct: 1,
                points: 2
            }
        ];

        // Глобальные переменные
        let currentGameId = null;
        let playerName = null;
        let currentQuestion = null;
        let hasAnswered = false;
        let gameListener = null;
        let pollInterval = null;
        let playerScore = 0;

        // Элементы DOM
        const joinScreen = document.getElementById('joinScreen');
        const waitingScreen = document.getElementById('waitingScreen');
        const questionScreen = document.getElementById('questionScreen');
        const joinButton = document.getElementById('joinButton');
        const errorContainer = document.getElementById('errorContainer');
        const playerNameInput = document.getElementById('playerName');
        const gameCodeInput = document.getElementById('gameCode');
        const displayName = document.getElementById('displayName');
        const displayCode = document.getElementById('displayCode');
        const displayScore = document.getElementById('displayScore');
        const questionText = document.getElementById('questionText');
        const optionsContainer = document.getElementById('optionsContainer');
        const answerStatus = document.getElementById('answerStatus');
        const questionCounter = document.getElementById('questionCounter');

        // Показать ошибку
        function showError(message) {
            errorContainer.innerHTML = `<div class="error">${message}</div>`;
            setTimeout(() => { errorContainer.innerHTML = ''; }, 3000);
        }

        // Переключить экран
        function switchScreen(screenName) {
            [joinScreen, waitingScreen, questionScreen].forEach(screen => {
                screen.classList.remove('active');
            });
            document.getElementById(screenName + 'Screen').classList.add('active');
        }

        // Сбросить состояние вопроса
        function resetQuestionState() {
            hasAnswered = false;
            currentQuestion = null;
            
            questionText.textContent = 'Загрузка вопроса...';
            optionsContainer.innerHTML = '';
            
            answerStatus.textContent = '⏳ Выбери вариант ответа';
            answerStatus.className = 'status waiting';
            
            document.querySelectorAll('.option').forEach(opt => {
                opt.classList.remove('selected');
            });
        }

        // Подключиться к игре
        function joinGame() {
            const name = playerNameInput.value.trim();
            const code = gameCodeInput.value.trim();
            
            if (!name || name.length < 2) {
                showError("Введите имя (минимум 2 символа)");
                return;
            }
            
            if (!code || code.length !== 8 || !/^\d+$/.test(code)) {
                showError("Введите 8 цифр кода викторины");
                return;
            }
            
            playerName = name;
            currentGameId = "game_" + code;
            
            joinButton.disabled = true;
            joinButton.innerHTML = '<i class="fas fa-spinner fa-spin"></i> ПОДКЛЮЧЕНИЕ...';
            
            // Проверяем существование игры
            SB.from('games').select('*').eq('code', code).then(snapshot => {
                if (!snapshot.data || snapshot.data.length === 0) {
                    throw new Error(`Викторина с кодом ${code} не найдена`);
                }
                
                const game = snapshot.data[0];
                
                // Проверяем, есть ли уже такой игрок
                return SB.from('players').select('*').eq('game_code', code).eq('name', name).then(checkSnapshot => {
                    if (checkSnapshot.data && checkSnapshot.data.length > 0) {
                        throw new Error("Участник с таким именем уже есть");
                    }
                    
                    // Регистрируем игрока
                    return SB.from('players').insert({
                        game_code: code,
                        name: name,
                        score: 0,
                        answered: false,
                        joined_at: Date.now(),
                        device: /Mobi|Android/i.test(navigator.userAgent) ? "📱 Телефон" : "💻 Компьютер"
                    });
                });
            }).then(() => {
                console.log("✅ Подключен к игре:", currentGameId);
                
                displayName.textContent = playerName;
                displayCode.textContent = code;
                
                switchScreen('waiting');
                startPolling();
                
                joinButton.disabled = false;
                joinButton.innerHTML = '🔌 ПОДКЛЮЧИТЬСЯ';
                
            }).catch(error => {
                showError(error.message);
                joinButton.disabled = false;
                joinButton.innerHTML = '🔌 ПОДКЛЮЧИТЬСЯ';
            });
        }

        // Поллинг изменений в игре
        function startPolling() {
            if (pollInterval) clearInterval(pollInterval);
            pollInterval = setInterval(checkGameStatus, 2000);
        }

        function checkGameStatus() {
            if (!currentGameId || !playerName) return;
            
            const code = currentGameId.replace('game_', '');
            
            // Получаем информацию об игре
            SB.from('games').select('*').eq('code', code).then(snapshot => {
                if (!snapshot.data || snapshot.data.length === 0) {
                    console.log("Игра удалена");
                    leaveGame();
                    return;
                }
                
                const game = snapshot.data[0];
                
                // Получаем информацию об игроке
                SB.from('players').select('*').eq('game_code', code).eq('name', playerName).then(playerSnapshot => {
                    if (playerSnapshot.data && playerSnapshot.data.length > 0) {
                        displayScore.textContent = playerSnapshot.data[0].score || 0;
                    }
                });
                
                // Если игра активна и есть текущий вопрос
                if (game.status === "active" && game.current_question) {
                    // Находим вопрос
                    const question = QUESTIONS.find(q => q.id === game.current_question);
                    
                    if (question && (!currentQuestion || currentQuestion.id !== question.id)) {
                        console.log("📌 Новый вопрос:", question.id);
                        
                        resetQuestionState();
                        currentQuestion = question;
                        displayQuestion(question);
                        switchScreen('question');
                    }
                }
            });
        }

        // Показать вопрос
        function displayQuestion(question) {
            questionText.textContent = question.text;
            questionCounter.textContent = `${question.id}/30`;
            
            optionsContainer.innerHTML = '';
            
            question.options.forEach((option, index) => {
                const optionDiv = document.createElement('div');
                optionDiv.className = 'option';
                optionDiv.dataset.index = index;
                optionDiv.innerHTML = `
                    <div class="option-letter">${String.fromCharCode(65 + index)}</div>
                    <div>${option}</div>
                `;
                
                optionDiv.addEventListener('click', () => selectAnswer(index));
                optionsContainer.appendChild(optionDiv);
            });
            
            answerStatus.textContent = '⏳ Выбери вариант ответа';
            answerStatus.className = 'status waiting';
        }

        // Выбрать ответ
        function selectAnswer(answerIndex) {
            if (hasAnswered || !currentQuestion || !currentGameId || !playerName) {
                return;
            }
            
            hasAnswered = true;
            
            // Подсветить выбранный вариант
            document.querySelectorAll('.option').forEach((opt, idx) => {
                opt.classList.remove('selected');
                if (idx === answerIndex) {
                    opt.classList.add('selected');
                }
            });
            
            // Проверяем правильность
            const isCorrect = (answerIndex === currentQuestion.correct);
            const code = currentGameId.replace('game_', '');
            
            // Отправляем ответ
            SB.from('answers').insert({
                game_code: code,
                question_id: currentQuestion.id,
                player_name: playerName,
                answer_index: answerIndex,
                is_correct: isCorrect,
                answered_at: Date.now()
            }).then(() => {
                // Если ответ правильный, увеличиваем счёт
                if (isCorrect) {
                    playerScore += currentQuestion.points || 1;
                    displayScore.textContent = playerScore;
                    
                    // Обновляем счёт игрока
                    SB.from('players').update({ score: playerScore, answered: true })
                        .eq('game_code', code)
                        .eq('name', playerName)
                        .then();
                } else {
                    // Отмечаем, что игрок ответил
                    SB.from('players').update({ answered: true })
                        .eq('game_code', code)
                        .eq('name', playerName)
                        .then();
                }
                
                // Показываем статус
                answerStatus.textContent = isCorrect ? "✅ ПРАВИЛЬНО!" : "❌ НЕПРАВИЛЬНО";
                answerStatus.className = isCorrect ? "status correct" : "status wrong";
                
                console.log(`📊 Ответ: ${isCorrect ? '✅' : '❌'}`);
                
            }).catch(error => {
                console.error("Ошибка отправки ответа:", error);
                showError("Ошибка при отправке ответа");
                hasAnswered = false; // Разрешить попробовать снова
            });
        }

        // Выйти из игры
        function leaveGame() {
            if (pollInterval) {
                clearInterval(pollInterval);
                pollInterval = null;
            }
            
            if (currentGameId && playerName) {
                const code = currentGameId.replace('game_', '');
                SB.from('players').delete().eq('game_code', code).eq('name', playerName).then();
            }
            
            currentGameId = null;
            playerName = null;
            currentQuestion = null;
            hasAnswered = false;
            
            playerNameInput.value = '';
            gameCodeInput.value = '';
            
            resetQuestionState();
            switchScreen('join');
        }

        // Валидация ввода кода
        gameCodeInput.addEventListener('input', function() {
            this.value = this.value.replace(/\D/g, '').substring(0, 8);
        });

        playerNameInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                gameCodeInput.focus();
            }
        });

        gameCodeInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                joinGame();
            }
        });

        joinButton.addEventListener('click', joinGame);

        window.leaveGame = leaveGame;

        // Инициализация
        document.addEventListener('DOMContentLoaded', function() {
            console.log("✅ Student panel загружен");
            playerNameInput.focus();
        });
    </script>
</body>
</html>
