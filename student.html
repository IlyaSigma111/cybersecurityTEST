<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ученик - Кибер Кахут</title>
    <style>
        body {
            background: #0a0a0a;
            color: #0f0;
            font-family: monospace;
            padding: 20px;
            text-align: center;
        }
        .container {
            max-width: 400px;
            margin: 0 auto;
        }
        input, button {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background: #000;
            color: #0f0;
            border: 2px solid #0f0;
            font-size: 1rem;
        }
        button {
            background: #0f0;
            color: #000;
            cursor: pointer;
            font-weight: bold;
        }
        .message {
            margin: 10px 0;
            padding: 10px;
        }
        .error { color: red; border: 1px solid red; }
        .success { color: #0f0; border: 1px solid #0f0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧑‍🎓 Ученик</h1>
        
        <input type="text" id="name" placeholder="Твоё имя">
        <input type="text" id="code" placeholder="Код игры">
        <button onclick="joinGame()">🔌 ПОДКЛЮЧИТЬСЯ</button>
        
        <div id="message"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://gluqnmznmjvlyguzkdrn.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_OUdy33oOIQlOce88IXAP9w_G74CkWr_';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        window.joinGame = async function() {
            const name = document.getElementById('name').value.trim();
            const code = document.getElementById('code').value.trim();
            const msgDiv = document.getElementById('message');
            
            if (!name || !code) {
                msgDiv.innerHTML = '<div class="message error">Введите имя и код</div>';
                return;
            }
            
            try {
                const { error } = await supabase
                    .from('players')
                    .insert({
                        game_code: code,
                        name: name,
                        score: 0,
                        answered: false,
                        joined_at: Date.now()
                    });
                
                if (error) {
                    msgDiv.innerHTML = '<div class="message error">Игрок с таким именем уже есть</div>';
                } else {
                    msgDiv.innerHTML = '<div class="message success">✅ Подключено! Ждите...</div>';
                }
                
            } catch (e) {
                msgDiv.innerHTML = '<div class="message error">Ошибка подключения</div>';
            }
        };
    </script>
</body>
</html>
