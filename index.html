<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кибер Кахут</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0a0a0a;
            color: #0f0;
            font-family: 'Courier New', monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            text-align: center;
            border: 3px solid #0f0;
            border-radius: 30px;
            padding: 60px 40px;
            background: #111;
            box-shadow: 0 0 50px rgba(0, 255, 0, 0.3);
            max-width: 600px;
            width: 90%;
        }
        
        h1 {
            font-size: 3.5rem;
            margin-bottom: 30px;
            text-shadow: 0 0 15px #0f0;
        }
        
        .subtitle {
            font-size: 1.2rem;
            margin-bottom: 50px;
            color: #0f0;
            opacity: 0.8;
        }
        
        .buttons {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .btn {
            display: block;
            padding: 20px;
            background: #000;
            color: #0f0;
            border: 2px solid #0f0;
            border-radius: 15px;
            text-decoration: none;
            font-size: 1.5rem;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        .btn:hover {
            background: #0f0;
            color: #000;
            box-shadow: 0 0 30px #0f0;
            transform: scale(1.05);
        }
        
        .btn.teacher {
            border-color: #ff00ff;
            color: #ff00ff;
        }
        
        .btn.teacher:hover {
            background: #ff00ff;
            color: #000;
            box-shadow: 0 0 30px #ff00ff;
        }
        
        .footer {
            margin-top: 50px;
            font-size: 0.9rem;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛡️ КИБЕР КАХУТ</h1>
        <p class="subtitle">Викторина по кибербезопасности в реальном времени</p>
        
        <div class="buttons">
            <a href="teacher.html" class="btn teacher">👨‍🏫 УЧИТЕЛЬ (на доску)</a>
            <a href="student.html" class="btn">🧑‍🎓 УЧЕНИК (на телефон)</a>
        </div>
        
        <div class="footer">
            ⚡ 15 вопросов • Realtime • Без регистрации
        </div>
    </div>
</body>
</html>
