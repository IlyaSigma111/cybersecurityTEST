<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Учитель - Кибер Кахут</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0a0a0a;
            color: #0f0;
            font-family: 'Courier New', monospace;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5rem;
            text-shadow: 0 0 10px #0f0;
        }
        
        .panel {
            background: #111;
            border: 2px solid #0f0;
            border-radius: 15px;
            padding: 20px;
            margin: 20px 0;
        }
        
        button {
            background: #0f0;
            color: #000;
            border: none;
            padding: 12px 24px;
            font-size: 1.1rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin: 5px;
        }
        
        button:hover {
            box-shadow: 0 0 20px #0f0;
        }
        
        .code-box {
            background: #000;
            border: 2px solid #0f0;
            border-radius: 10px;
            padding: 20px;
            margin: 20px 0;
            text-align: center;
        }
        
        .code {
            font-size: 3rem;
            font-weight: bold;
            letter-spacing: 5px;
        }
        
        #playersList {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        
        .player-card {
            background: #000;
            border: 2px solid #0f0;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
        }
        
        .player-card.answered {
            border-color: #ff00ff;
            box-shadow: 0 0 15px #ff00ff;
        }
        
        .player-name {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .player-score {
            font-size: 1.5rem;
            color: #ff00ff;
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>👨‍🏫 ПАНЕЛЬ УЧИТЕЛЯ</h1>
        
        <div class="panel">
            <button onclick="createGame()" id="createBtn">🎮 СОЗДАТЬ НОВУЮ ИГРУ</button>
            
            <div id="gameInfo" class="hidden">
                <div class="code-box">
                    <div style="font-size: 1rem; margin-bottom: 10px;">КОД ИГРЫ</div>
                    <div class="code" id="gameCodeDisplay">----</div>
                </div>
                
                <h2>ИГРОКИ:</h2>
                <div id="playersList"></div>
            </div>
        </div>
    </div>

    <script>
        // Используем ДРУГОЕ имя вместо supabase
        const sbClient = window.supabase.createClient(
            'https://gluqnmznmjvlyguzkdrn.supabase.co',
            'sb_publishable_OUdy33oOIQlOce88IXAP9w_G74CkWr_'
        );
        
        let currentGameCode = null;
        let playersInterval = null;
        
        window.createGame = async function() {
            try {
                // Создаём игру
                const code = Math.floor(10000000 + Math.random() * 90000000).toString();
                
                const { error } = await sbClient
                    .from('games')
                    .insert({ 
                        code: code, 
                        created_at: Date.now(),
                        status: 'waiting'
                    });
                
                if (error) throw error;
                
                currentGameCode = code;
                
                document.getElementById('createBtn').style.display = 'none';
                document.getElementById('gameInfo').classList.remove('hidden');
                document.getElementById('gameCodeDisplay').textContent = code;
                
                // Запускаем обновление списка игроков
                if (playersInterval) clearInterval(playersInterval);
                updatePlayers();
                playersInterval = setInterval(updatePlayers, 2000);
                
            } catch (e) {
                alert('Ошибка: ' + e.message);
            }
        };
        
        async function updatePlayers() {
            if (!currentGameCode) return;
            
            try {
                const { data, error } = await sbClient
                    .from('players')
                    .select('*')
                    .eq('game_code', currentGameCode);
                
                if (error) throw error;
                
                const list = document.getElementById('playersList');
                
                if (!data || data.length === 0) {
                    list.innerHTML = '<div class="player-card">👤 Ожидание игроков...</div>';
                } else {
                    list.innerHTML = data.map(p => `
                        <div class="player-card ${p.answered ? 'answered' : ''}">
                            <div class="player-name">${p.name}</div>
                            <div class="player-score">${p.score || 0}</div>
                            ${p.answered ? '<div style="color:#ff00ff;">✅</div>' : ''}
                        </div>
                    `).join('');
                }
                
            } catch (e) {
                console.error('Ошибка обновления:', e);
            }
        }
        
        // Очищаем интервал при выходе
        window.onbeforeunload = function() {
            if (playersInterval) clearInterval(playersInterval);
        };
    </script>
</body>
</html>
