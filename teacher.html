<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Учитель - Кибер Кахут</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0a0a0a;
            color: #0f0;
            font-family: 'Courier New', monospace;
            padding: 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #0f0;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 20px;
        }
        
        .code-box {
            background: #111;
            border: 2px solid #0f0;
            border-radius: 20px;
            padding: 15px 30px;
            text-align: center;
        }
        
        .code-label {
            font-size: 1rem;
            opacity: 0.7;
        }
        
        .code-value {
            font-size: 4rem;
            font-weight: bold;
            letter-spacing: 10px;
            text-shadow: 0 0 20px #0f0;
        }
        
        .btn {
            background: #000;
            color: #0f0;
            border: 2px solid #0f0;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        .btn:hover {
            background: #0f0;
            color: #000;
            box-shadow: 0 0 30px #0f0;
        }
        
        .btn.pink {
            border-color: #ff00ff;
            color: #ff00ff;
        }
        
        .btn.pink:hover {
            background: #ff00ff;
            color: #000;
            box-shadow: 0 0 30px #ff00ff;
        }
        
        .dashboard {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
            margin-top: 20px;
        }
        
        .panel {
            background: #111;
            border: 2px solid #0f0;
            border-radius: 20px;
            padding: 20px;
        }
        
        .panel h2 {
            margin-bottom: 20px;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: #000;
            border: 1px solid #0f0;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 2.5rem;
            font-weight: bold;
        }
        
        .stat-label {
            font-size: 0.9rem;
            opacity: 0.7;
        }
        
        .players-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 400px;
            overflow-y: auto;
        }
        
        .player-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #000;
            border: 1px solid #0f0;
            border-radius: 10px;
            padding: 15px;
        }
        
        .player-row.answered {
            border-color: #ff00ff;
            box-shadow: 0 0 15px #ff00ff;
        }
        
        .player-name {
            font-size: 1.2rem;
            font-weight: bold;
        }
        
        .player-score {
            font-size: 1.5rem;
            color: #ff00ff;
        }
        
        .questions-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin: 20px 0;
        }
        
        .question-card {
            background: #000;
            border: 2px solid #0f0;
            border-radius: 10px;
            padding: 15px 5px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .question-card:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px #0f0;
        }
        
        .question-card.active {
            border-color: #ff00ff;
            box-shadow: 0 0 20px #ff00ff;
        }
        
        .question-card.completed {
            border-color: #00ffff;
            opacity: 0.7;
        }
        
        .question-number {
            font-size: 1.5rem;
            font-weight: bold;
        }
        
        .question-difficulty {
            font-size: 0.8rem;
            margin: 5px 0;
        }
        
        .question-status {
            font-size: 1.2rem;
        }
        
        #currentQuestionPanel {
            margin-top: 20px;
            padding: 20px;
            background: #000;
            border: 2px solid #0f0;
            border-radius: 15px;
        }
        
        .question-text {
            font-size: 2rem;
            margin: 20px 0;
            line-height: 1.4;
        }
        
        .options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin: 20px 0;
        }
        
        .option {
            background: #111;
            border: 2px solid #0f0;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            font-size: 1.2rem;
        }
        
        .option.correct {
            border-color: #ff00ff;
            box-shadow: 0 0 20px #ff00ff;
        }
        
        .stats-row {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
        }
        
        .control-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>👨‍🏫 ПАНЕЛЬ УЧИТЕЛЯ</h1>
            <div class="code-box">
                <div class="code-label">КОД ИГРЫ</div>
                <div class="code-value" id="gameCodeDisplay">----</div>
            </div>
        </div>
        
        <div style="text-align: center; margin-bottom: 20px;">
            <button class="btn" onclick="createGame()" id="createBtn">🎮 СОЗДАТЬ НОВУЮ ИГРУ</button>
        </div>
        
        <div id="gamePanel" style="display: none;">
            <div class="dashboard">
                <!-- Левая колонка: игроки и статистика -->
                <div class="panel">
                    <h2><span>👥</span> ИГРОКИ</h2>
                    
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-value" id="playerCount">0</div>
                            <div class="stat-label">всего</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value" id="answeredCount">0</div>
                            <div class="stat-label">ответили</div>
                        </div>
                    </div>
                    
                    <div class="players-list" id="playersList">
                        <div style="text-align: center; padding: 20px;">👤 Ожидание игроков...</div>
                    </div>
                </div>
                
                <!-- Правая колонка: вопросы и управление -->
                <div class="panel">
                    <h2><span>❓</span> ВОПРОСЫ</h2>
                    
                    <div class="questions-grid" id="questionsGrid"></div>
                    
                    <div id="currentQuestionPanel">
                        <div class="question-text" id="currentQuestionText">Нажми на вопрос, чтобы показать</div>
                        
                        <div class="options" id="optionsContainer"></div>
                        
                        <div class="stats-row">
                            <div>✅ Правильно: <span id="correctCount">0</span></div>
                            <div>📊 Прогресс: <span id="questionProgress">0/15</span></div>
                        </div>
                        
                        <div class="control-buttons">
                            <button class="btn" onclick="showAnswer()" id="showAnswerBtn" disabled>🔍 ПОКАЗАТЬ ОТВЕТ</button>
                            <button class="btn pink" onclick="nextQuestion()" id="nextBtn" disabled>⏩ СЛЕДУЮЩИЙ</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ========== КОНФИГУРАЦИЯ SUPABASE ==========
        const SUPABASE_URL = 'https://gluqnmznmjvlyguzkdrn.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_OUdy33oOIQlOce88IXAP9w_G74CkWr_';
        const supabase = supabaseJs.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        // ========== ВОПРОСЫ ==========
        const QUESTIONS = [
            {
                id: 1,
                text: "Что такое фишинг?",
                options: ["Вид рыбалки", "Кража данных", "Антивирус", "Шифрование"],
                correct: 1,
                points: 1,
                difficulty: "easy"
            },
            {
                id: 2,
                text: "Какой пароль самый ненадежный?",
                options: ["G7$k2!mN9", "Tr0ub4dor&3", "qwerty123", "P@ssw0rd!$"],
                correct: 2,
                points: 1,
                difficulty: "easy"
            },
            {
                id: 3,
                text: "Что такое 2FA?",
                options: ["2 аккаунта", "2 фактора", "2 файла", "2 вируса"],
                correct: 1,
                points: 1,
                difficulty: "easy"
            },
            {
                id: 4,
                text: "Что такое VPN?",
                options: ["Вирус", "Частная сеть", "Пароль", "Антивирус"],
                correct: 1,
                points: 1,
                difficulty: "easy"
            },
            {
                id: 5,
                text: "Что такое бэкап?",
                options: ["Копия", "Удаление", "Вирус", "Игра"],
                correct: 0,
                points: 1,
                difficulty: "easy"
            },
            {
                id: 6,
                text: "Что такое социальная инженерия?",
                options: ["Инженерия", "Обман людей", "Строительство", "Шифрование"],
                correct: 1,
                points: 2,
                difficulty: "medium"
            },
            {
                id: 7,
                text: "Что такое вредоносное ПО?",
                options: ["Игра", "Вирусы", "Антивирус", "Браузер"],
                correct: 1,
                points: 2,
                difficulty: "medium"
            },
            {
                id: 8,
                text: "Что такое кибербуллинг?",
                options: ["Взлом", "Травля в сети", "Вирус", "Спорт"],
                correct: 1,
                points: 2,
                difficulty: "medium"
            },
            {
                id: 9,
                text: "Чем опасен публичный Wi-Fi?",
                options: ["Бесплатно", "Кража данных", "Медленно", "Не опасно"],
                correct: 1,
                points: 2,
                difficulty: "medium"
            },
            {
                id: 10,
                text: "Зачем обновлять программы?",
                options: ["Новые кнопки", "Закрыть уязвимости", "Деньги", "Трафик"],
                correct: 1,
                points: 2,
                difficulty: "medium"
            },
            {
                id: 11,
                text: "Что такое программа-вымогатель?",
                options: ["Игра", "Блокирует файлы", "Антивирус", "Браузер"],
                correct: 1,
                points: 3,
                difficulty: "hard"
            },
            {
                id: 12,
                text: "Что такое сниффер?",
                options: ["Нюхач", "Перехват данных", "Фильтр", "Антивирус"],
                correct: 1,
                points: 3,
                difficulty: "hard"
            },
            {
                id: 13,
                text: "Что такое ботнет?",
                options: ["Сеть зомби", "Робот", "Соцсеть", "Браузер"],
                correct: 0,
                points: 3,
                difficulty: "hard"
            },
            {
                id: 14,
                text: "Что такое Honeypot?",
                options: ["Приманка", "Антивирус", "Пароль", "Сейф"],
                correct: 0,
                points: 3,
                difficulty: "hard"
            },
            {
                id: 15,
                text: "Главное правило безопасности?",
                options: ["Секретов нет", "Проверять информацию", "Длинный пароль", "Антивирус"],
                correct: 1,
                points: 3,
                difficulty: "hard"
            }
        ];
        
        // ========== СОСТОЯНИЕ ==========
        let currentGameCode = null;
        let currentQuestionIndex = -1;
        let subscription = null;
        
        // ========== ОТРИСОВКА ВОПРОСОВ ==========
        function renderQuestions() {
            const grid = document.getElementById('questionsGrid');
            if (!grid) return;
            
            grid.innerHTML = QUESTIONS.map((q, i) => {
                let cls = 'question-card';
                if (i === currentQuestionIndex) cls += ' active';
                else if (i < currentQuestionIndex) cls += ' completed';
                
                let difficultyColor = q.difficulty === 'easy' ? '#0f0' : q.difficulty === 'medium' ? 'yellow' : 'red';
                
                return `
                    <div class="${cls}" onclick="selectQuestion(${i})">
                        <div class="question-number">${i + 1}</div>
                        <div class="question-difficulty" style="color: ${difficultyColor};">${q.difficulty}</div>
                        <div class="question-status">${i === currentQuestionIndex ? '🔴' : i < currentQuestionIndex ? '✅' : '⏳'}</div>
                    </div>
                `;
            }).join('');
            
            document.getElementById('questionProgress').innerText = (currentQuestionIndex + 1) + '/' + QUESTIONS.length;
        }
        
        // ========== ВЫБОР ВОПРОСА ==========
        window.selectQuestion = function(index) {
            currentQuestionIndex = index;
            renderQuestions();
            
            const q = QUESTIONS[index];
            document.getElementById('currentQuestionText').innerText = q.text;
            
            const optionsHtml = q.options.map((opt, i) => 
                `<div class="option">${opt}</div>`
            ).join('');
            document.getElementById('optionsContainer').innerHTML = optionsHtml;
            
            document.getElementById('showAnswerBtn').disabled = false;
            document.getElementById('nextBtn').disabled = true;
        };
        
        // ========== ПОКАЗАТЬ ОТВЕТ ==========
        window.showAnswer = function() {
            if (currentQuestionIndex < 0) return;
            
            const q = QUESTIONS[currentQuestionIndex];
            const options = document.querySelectorAll('.option');
            
            options.forEach((opt, i) => {
                if (i === q.correct) {
                    opt.classList.add('correct');
                }
            });
            
            document.getElementById('showAnswerBtn').disabled = true;
            document.getElementById('nextBtn').disabled = false;
        };
        
        // ========== СЛЕДУЮЩИЙ ВОПРОС ==========
        window.nextQuestion = function() {
            if (currentQuestionIndex + 1 < QUESTIONS.length) {
                selectQuestion(currentQuestionIndex + 1);
            } else {
                alert('🎉 Викторина окончена!');
            }
        };
        
        // ========== СОЗДАТЬ ИГРУ ==========
        window.createGame = async function() {
            const code = Math.floor(10000000 + Math.random() * 90000000).toString();
            
            const { error } = await supabase
                .from('games')
                .insert({ 
                    code: code, 
                    created_at: Date.now(), 
                    status: 'waiting',
                    current_question: 0
                });
            
            if (error) {
                alert('Ошибка создания игры: ' + error.message);
                return;
            }
            
            currentGameCode = code;
            document.getElementById('gameCodeDisplay').innerText = code;
            document.getElementById('createBtn').style.display = 'none';
            document.getElementById('gamePanel').style.display = 'block';
            
            // Подписка на изменения игроков
            if (subscription) subscription.unsubscribe();
            
            subscription = supabase
                .channel('players-channel')
                .on('postgres_changes', { 
                    event: '*', 
                    schema: 'public', 
                    table: 'players',
                    filter: `game_code=eq.${code}`
                }, updatePlayersList)
                .subscribe();
            
            selectQuestion(0);
        };
        
        // ========== ОБНОВЛЕНИЕ СПИСКА ИГРОКОВ ==========
        async function updatePlayersList() {
            if (!currentGameCode) return;
            
            const { data, error } = await supabase
                .from('players')
                .select('*')
                .eq('game_code', currentGameCode);
            
            if (error) return;
            
            document.getElementById('playerCount').innerText = data.length;
            document.getElementById('answeredCount').innerText = data.filter(p => p.answered).length;
            
            const list = document.getElementById('playersList');
            if (data.length === 0) {
                list.innerHTML = '<div style="text-align: center; padding: 20px;">👤 Ожидание игроков...</div>';
            } else {
                list.innerHTML = data.map(p => `
                    <div class="player-row ${p.answered ? 'answered' : ''}">
                        <span class="player-name">${p.name}</span>
                        <span class="player-score">${p.score}</span>
                    </div>
                `).join('');
            }
        }
        
        // ========== ИНИЦИАЛИЗАЦИЯ ==========
        renderQuestions();
    </script>
</body>
</html>
