        .code-display {

            border-radius: 10px;
            cursor: pointer;
            background: rgba(0,255,0,0.1);
            color: #0f0;
            font-family: 'Share Tech Mono', monospace;
            text-decoration: none;
            transition: all 0.3s;
        }
        
        .glass-btn:hover {
            background: rgba(0,255,0,0.2);
            box-shadow: 0 0 20px #0f0;
            transform: translateY(-2px);
        }
        
        .glass-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .main-content {
            display: flex;
            flex: 1;

        .left-column {

            flex-direction: column;
            gap: 20px;

        }
        
        .right-column {

            gap: 20px;

        }
        
        .glass-panel {

            overflow: hidden;

            font-size: 1.3rem;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }
        
        .control-buttons {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }
        
        .control-buttons .glass-btn {
            padding: 15px;
            font-size: 1rem;
            justify-content: flex-start;
        }
        
        .info-block {
            background: rgba(0,0,0,0.3);
            border: 1px solid #0f0;
            border-radius: 12px;
            padding: 15px;
            margin-top: 15px;
        }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        
        .info-row:last-child {
            margin-bottom: 0;
        }
        
        .info-label {
            color: rgba(0,255,0,0.7);
        }
        
        .info-value {
            color: #0f0;
            font-weight: 700;
            font-size: 1.2rem;
        }

            overflow-y: auto;
            overflow-x: hidden;
            padding-right: 5px;
            min-height: 0;
        }
        
        .players-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 12px;
        }
        
        .player-card {
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid #0f0;
            border-radius: 16px;
            padding: 15px;
            text-align: center;
            transition: all 0.3s;
        }
        
        .player-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 20px rgba(0,255,0,0.3);
        }

            height: 50px;
            background: #0f0;
            color: black;
            border-radius: 50%;

            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: 900;
        }

            margin-bottom: 5px;

        }
        
        .player-score {
            color: #0f0;
            font-size: 0.9rem;
        }
        
        .player-card.answered {
            border-color: #ff00ff;
            box-shadow: 0 0 15px #ff00ff;
        }

            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding-right: 5px;
            min-height: 0;
        }
        
        .questions-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));

        }
        
        .question-item {

            border-radius: 12px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

            box-shadow: 0 0 20px rgba(0,255,0,0.3);
        }
        
        .question-item.active { 
            border-color: #ff00ff; 
            box-shadow: 0 0 20px #ff00ff;
            background: rgba(255,0,255,0.1);
        }
        
        .question-item.completed { 
            border-color: #00ffff;

        }

            font-size: 1.3rem;
            margin-bottom: 5px;
        }

            font-size: 0.7rem;
            margin-bottom: 5px;
        }

            font-size: 0.9rem;
        }

            font-size: 50px;

            right: 0;
            bottom: 0;

            z-index: 1000;
            display: none;
            flex-direction: column;

            from { opacity: 0; }
            to { opacity: 1; }
        }

            align-items: center;

        const startSection = document.getElementById('startSection');
        const gameControls = document.getElementById('gameControls');
        const gameCodeDisplay = document.getElementById('gameCode');
        const playersList = document.getElementById('playersList');
        const playersContainer = document.getElementById('playersContainer');
        const playerCount = document.getElementById('playerCount');
        const playersCount = document.getElementById('playersCount');
        const questionsList = document.getElementById('questionsList');
        const currentQ = document.getElementById('currentQ');
        const presentationMode = document.getElementById('presentationMode');
        const presentationQNum = document.getElementById('presentationQNum');
        const presentationQuestion = document.getElementById('presentationQuestion');
        const answeredCount = document.getElementById('answeredCount');
        const correctCount = document.getElementById('correctCount');
        const startQuestionBtn = document.getElementById('startQuestionBtn');
        const showAnswerBtn = document.getElementById('showAnswerBtn');
        const nextQuestionBtn = document.getElementById('nextQuestionBtn');

        // ========== ОТРИСОВКА ВОПРОСОВ ==========
        function renderQuestions() {
            if (!questionsList) return;
            
            questionsList.innerHTML = QUESTIONS.map((q, i) => {
                let cls = 'question-item';
                if (i === currentQuestionIndex) cls += ' active';
                else if (i < currentQuestionIndex) cls += ' completed';
                
                let difficultyColor = q.difficulty === 'easy' ? '#0f0' : q.difficulty === 'medium' ? 'yellow' : 'red';
                let difficultyText = q.difficulty === 'easy' ? 'ЛЁГКИЙ' : q.difficulty === 'medium' ? 'СРЕДНИЙ' : 'СЛОЖНЫЙ';
                
                return `
                    <div class="${cls}" onclick="jumpToQuestion(${i})">
                        <div class="question-number">${i + 1}</div>
                        <div class="question-difficulty" style="color: ${difficultyColor};">${difficultyText}</div>
                        <div class="question-status">
                            ${i === currentQuestionIndex ? '🔴' : i < currentQuestionIndex ? '✅' : '⏳'}
                        </div>
                    </div>
                `;
            }).join('');
            
            const progressEl = document.getElementById('questionProgress');
            if (progressEl) {
                progressEl.innerText = (currentQuestionIndex + 1) + '/' + QUESTIONS.length;
            }
        }

        // ========== ВЫБОР ВОПРОСА ==========
        window.selectQuestion = function(index) {
            currentQuestionIndex = index;
            renderQuestions();
            
            const q = QUESTIONS[index];
            document.getElementById('currentQuestionText').innerText = q.text;
            
            const optionsHtml = q.options.map((opt, i) => 
                `<div class="option">${opt}</div>`
            ).join('');
            document.getElementById('optionsContainer').innerHTML = optionsHtml;
            
            document.getElementById('showAnswerBtn').disabled = false;
            document.getElementById('nextBtn').disabled = true;
        };

        // ========== ПОКАЗАТЬ ОТВЕТ ==========
        window.showAnswer = function() {
            if (currentQuestionIndex < 0) return;
            
            const q = QUESTIONS[currentQuestionIndex];
            const options = document.querySelectorAll('.option');
            
            options.forEach((opt, i) => {
                if (i === q.correct) {
                    opt.classList.add('correct');
                }
            });
            
            document.getElementById('showAnswerBtn').disabled = true;
            document.getElementById('nextBtn').disabled = false;
        };

        // ========== СЛЕДУЮЩИЙ ВОПРОС ==========
        window.nextQuestion = function() {
            if (currentQuestionIndex + 1 < QUESTIONS.length) {
                selectQuestion(currentQuestionIndex + 1);
            } else {
                alert('🎉 Викторина окончена!');
            }
        };

        // ========== СОЗДАТЬ ИГРУ ==========
        window.startNewGame = async function() {
            try {
                const code = Math.floor(10000000 + Math.random() * 90000000).toString();
                
                const { error } = await SB
                    .from('games')
                    .insert({ 
                        code: code, 
                        created_at: Date.now(), 
                        status: 'waiting'
                    });
                
                if (error) {
                    console.error('Ошибка создания игры:', error);
                    alert('Ошибка создания игры: ' + error.message);
                    return;
                }
                
                currentGameCode = code;
                currentGameId = 'game_' + code;
                currentQuestionIndex = 0;
                
                startSection.style.display = 'none';
                gameControls.style.display = 'block';
                gameCodeDisplay.innerText = code;
                currentQ.innerText = '0/' + QUESTIONS.length;
                
                renderQuestions();
                startPollingPlayers();
                
                alert(`✅ Викторина создана!\nКод: ${code}`);
                
            } catch (e) {
                console.error('Ошибка:', e);
                alert('Ошибка: ' + e.message);
            }
        };

        // ========== ПОЛЛИНГ ИГРОКОВ ==========
        function startPollingPlayers() {
            if (pollInterval) clearInterval(pollInterval);
            pollInterval = setInterval(updatePlayersList, 2000);
        }

        async function updatePlayersList() {
            if (!currentGameCode) return;
            
            try {
                const { data, error } = await SB
                    .from('players')
                    .select('*')
                    .eq('game_code', currentGameCode);
                
                if (error) throw error;
                
                const count = data ? data.length : 0;
                playerCount.innerText = count;
                playersCount.innerText = count;
                
                const list = document.getElementById('playersList');
                if (!data || data.length === 0) {
                    list.innerHTML = '<div class="empty-state"><div class="empty-icon">👤</div><p>Ожидание игроков...</p></div>';
                    return;
                }
                
                list.innerHTML = data.map(p => `
                    <div class="player-card ${p.answered ? 'answered' : ''}">
                        <div class="player-avatar">${p.name ? p.name.charAt(0).toUpperCase() : '?'}</div>
                        <div class="player-name">${p.name || 'Без имени'}</div>
                        <div class="player-score">🎯 ${p.score || 0}</div>
                        ${p.answered ? '<div style="color: #ff00ff; font-size: 0.8rem;">✅ ответил</div>' : ''}
                    </div>
                `).join('');
                
            } catch (e) {
                console.error('Ошибка обновления игроков:', e);
            }
        }

        // ========== СБРОС ИГРЫ ==========
        window.resetGame = function() {
            if (confirm("Сбросить викторину и начать заново?")) {
                if (pollInterval) clearInterval(pollInterval);
                currentGameCode = null;
                currentQuestionIndex = 0;
                
                startSection.style.display = 'block';
                gameControls.style.display = 'none';
                gameCodeDisplay.innerText = '----';
                playerCount.innerText = '0';
                playersCount.innerText = '0';
                currentQ.innerText = '0/30';
                
                document.getElementById('playersList').innerHTML = '<div class="empty-state"><div class="empty-icon">👤</div><p>Ожидание игроков...</p></div>';
                renderQuestions();
                exitPresentation();
            }
        };

        // ========== ПРЕЗЕНТАЦИЯ ==========
        window.startNextQuestion = function() {
            if (currentQuestionIndex >= QUESTIONS.length) {
                alert('🎉 Все вопросы пройдены!');
                return;
            }
            
            const q = QUESTIONS[currentQuestionIndex];
            document.getElementById('presentationQuestion').innerHTML = `<h2>${q.text}</h2>`;
            document.getElementById('presentationMode').classList.add('active');
            document.getElementById('presentationQNum').innerText = (currentQuestionIndex + 1) + '/30';
            
            document.getElementById('showAnswerBtn').disabled = false;
            document.getElementById('nextBtn').disabled = true;
        };

        window.exitPresentation = function() {
            document.getElementById('presentationMode').classList.remove('active');
        };

        window.jumpToQuestion = function(index) {
            if (!currentGameCode) {
                alert("Сначала создайте викторину!");
                return;
            }
            currentQuestionIndex = index;
            renderQuestions();
        };

        // ========== ИНИЦИАЛИЗАЦИЯ ==========
        renderQuestions();
    </script>
