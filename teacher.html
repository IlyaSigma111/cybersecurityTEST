<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Учитель - Кибер Кахут</title>
    <style>
        body {
            background: black;
            color: #0f0;
            font-family: monospace;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            text-align: center;
        }
        .code-box {
            border: 2px solid #0f0;
            padding: 30px;
            margin: 20px 0;
            font-size: 4rem;
            background: #111;
        }
        button {
            background: #0f0;
            color: black;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            cursor: pointer;
            margin: 10px;
            font-weight: bold;
        }
        button:hover {
            box-shadow: 0 0 30px #0f0;
        }
        .players {
            margin-top: 20px;
            text-align: left;
        }
        .player {
            border: 1px solid #0f0;
            padding: 10px;
            margin: 5px 0;
            background: #111;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>👨‍🏫 УЧИТЕЛЬ</h1>
        
        <div class="code-box" id="codeDisplay">----</div>
        
        <button onclick="createGame()" id="createBtn">🎮 СОЗДАТЬ ИГРУ</button>
        
        <div id="gamePanel" style="display: none;">
            <h2>ИГРОКИ:</h2>
            <div class="players" id="playersList"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Используем уникальное имя, чтобы не было конфликтов
        const App = {};

        // Инициализация после полной загрузки страницы
        window.addEventListener('load', function() {
            try {
                App.supabase = window.supabase.createClient(
                    'https://gluqnmznmjvlyguzkdrn.supabase.co',
                    'sb_publishable_OUdy33oOIQlOce88IXAP9w_G74CkWr_'
                );
                console.log('✅ Supabase готов');
            } catch (e) {
                console.error('❌ Ошибка Supabase:', e);
            }
        });

        // Глобальная функция создания игры
        window.createGame = async function() {
            if (!App.supabase) {
                alert('Подождите, инициализация...');
                return;
            }

            try {
                const code = Math.floor(10000000 + Math.random() * 90000000).toString();
                
                const { error } = await App.supabase
                    .from('games')
                    .insert({ 
                        code: code, 
                        created_at: Date.now() 
                    });
                
                if (error) throw error;
                
                App.gameCode = code;
                document.getElementById('codeDisplay').innerText = code;
                document.getElementById('createBtn').style.display = 'none';
                document.getElementById('gamePanel').style.display = 'block';
                
                // Обновление игроков
                updatePlayers();
                setInterval(updatePlayers, 2000);
                
            } catch (e) {
                alert('Ошибка: ' + e.message);
            }
        };

        // Функция обновления списка игроков
        async function updatePlayers() {
            if (!App.gameCode || !App.supabase) return;
            
            try {
                const { data, error } = await App.supabase
                    .from('players')
                    .select('*')
                    .eq('game_code', App.gameCode);
                
                if (error) throw error;
                
                const list = document.getElementById('playersList');
                
                if (!data || data.length === 0) {
                    list.innerHTML = '<div class="player">👤 Ожидание игроков...</div>';
                } else {
                    list.innerHTML = data.map(p => 
                        `<div class="player">👤 ${p.name} | 🎯 ${p.score || 0}</div>`
                    ).join('');
                }
                
            } catch (e) {
                console.error('Ошибка обновления:', e);
            }
        }
    </script>
</body>
</html>
