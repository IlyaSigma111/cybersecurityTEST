<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Учитель - Кибер Кахут</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0a0a0a;
            color: #0f0;
            font-family: 'Courier New', monospace;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5rem;
            text-shadow: 0 0 10px #0f0;
        }
        
        .code-box {
            background: #111;
            border: 2px solid #0f0;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            margin-bottom: 30px;
        }
        
        .code-label {
            font-size: 1rem;
            opacity: 0.7;
        }
        
        .code-value {
            font-size: 4rem;
            font-weight: bold;
            letter-spacing: 10px;
        }
        
        .btn {
            background: #000;
            color: #0f0;
            border: 2px solid #0f0;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            margin: 10px;
        }
        
        .btn:hover {
            background: #0f0;
            color: #000;
            box-shadow: 0 0 30px #0f0;
        }
        
        .players-list {
            margin-top: 20px;
        }
        
        .player-item {
            background: #111;
            border: 1px solid #0f0;
            padding: 10px;
            margin: 5px 0;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>👨‍🏫 ПАНЕЛЬ УЧИТЕЛЯ</h1>
        
        <div class="code-box">
            <div class="code-label">КОД ИГРЫ</div>
            <div class="code-value" id="gameCodeDisplay">----</div>
        </div>
        
        <div style="text-align: center;">
            <button class="btn" onclick="createGame()" id="createBtn">🎮 СОЗДАТЬ ИГРУ</button>
        </div>
        
        <div id="gamePanel" style="display: none;">
            <h2>Игроки:</h2>
            <div class="players-list" id="playersList">
                <p>Ожидание игроков...</p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // ========== НАСТРОЙКИ ==========
        const SUPABASE_URL = 'https://gluqnmznmjvlyguzkdrn.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_OUdy33oOIQlOce88IXAP9w_G74CkWr_';
        
        // ========== СОЗДАЁМ КЛИЕНТ ==========
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        // ========== ПЕРЕМЕННЫЕ ==========
        let currentGameCode = null;
        let playersInterval = null;
        
        // ========== ФУНКЦИЯ СОЗДАНИЯ ИГРЫ ==========
        window.createGame = async function() {
            try {
                const code = Math.floor(10000000 + Math.random() * 90000000).toString();
                
                const { error } = await supabase
                    .from('games')
                    .insert({ 
                        code: code, 
                        created_at: Date.now(), 
                        status: 'waiting' 
                    });
                
                if (error) {
                    alert('Ошибка: ' + error.message);
                    return;
                }
                
                currentGameCode = code;
                document.getElementById('gameCodeDisplay').innerText = code;
                document.getElementById('createBtn').style.display = 'none';
                document.getElementById('gamePanel').style.display = 'block';
                
                // Запускаем опрос игроков
                startPolling();
                
            } catch (e) {
                alert('Ошибка: ' + e.message);
            }
        };
        
        // ========== ОПРОС ИГРОКОВ ==========
        function startPolling() {
            if (playersInterval) clearInterval(playersInterval);
            updatePlayers();
            playersInterval = setInterval(updatePlayers, 2000);
        }
        
        async function updatePlayers() {
            if (!currentGameCode) return;
            
            try {
                const { data, error } = await supabase
                    .from('players')
                    .select('*')
                    .eq('game_code', currentGameCode);
                
                if (error) return;
                
                const list = document.getElementById('playersList');
                
                if (data.length === 0) {
                    list.innerHTML = '<p>👤 Ожидание игроков...</p>';
                } else {
                    list.innerHTML = data.map(p => `
                        <div class="player-item">
                            <span>👤 ${p.name}</span>
                            <span>🎯 ${p.score || 0}</span>
                        </div>
                    `).join('');
                }
            } catch (e) {
                console.error('Error:', e);
            }
        }
    </script>
</body>
</html>
