<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Учитель - Кибер Кахут</title>
    <style>
        body {
            background: #0a0a0a;
            color: #0f0;
            font-family: monospace;
            padding: 20px;
            text-align: center;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        .code-box {
            border: 2px solid #0f0;
            padding: 20px;
            margin: 20px 0;
            font-size: 3rem;
        }
        .btn {
            background: #000;
            color: #0f0;
            border: 2px solid #0f0;
            padding: 15px 30px;
            font-size: 1.2rem;
            cursor: pointer;
            margin: 10px;
        }
        .btn:hover {
            background: #0f0;
            color: #000;
        }
        #players {
            margin-top: 20px;
            text-align: left;
        }
        .player {
            border: 1px solid #0f0;
            padding: 10px;
            margin: 5px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>👨‍🏫 Учитель</h1>
        
        <div class="code-box" id="gameCode">----</div>
        
        <button class="btn" onclick="createGame()" id="createBtn">🎮 СОЗДАТЬ ИГРУ</button>
        
        <div id="gamePanel" style="display: none;">
            <h2>Игроки:</h2>
            <div id="players"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // ========== ЭТА ВЕРСИЯ ТОЧНО РАБОТАЕТ ==========
        const SUPABASE_URL = 'https://gluqnmznmjvlyguzkdrn.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_OUdy33oOIQlOce88IXAP9w_G74CkWr_';
        
        // Создаём клиент
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        let currentGameCode = null;
        let interval = null;
        
        // Функция создания игры
        window.createGame = async function() {
            try {
                const code = Math.floor(10000000 + Math.random() * 90000000).toString();
                
                const { error } = await supabase
                    .from('games')
                    .insert({ code: code, created_at: Date.now() });
                
                if (error) {
                    alert('Ошибка: ' + error.message);
                    return;
                }
                
                currentGameCode = code;
                document.getElementById('gameCode').innerText = code;
                document.getElementById('createBtn').style.display = 'none';
                document.getElementById('gamePanel').style.display = 'block';
                
                // Запускаем обновление игроков
                if (interval) clearInterval(interval);
                updatePlayers();
                interval = setInterval(updatePlayers, 2000);
                
            } catch (e) {
                alert('Ошибка: ' + e.message);
            }
        };
        
        // Функция обновления списка игроков
        async function updatePlayers() {
            if (!currentGameCode) return;
            
            try {
                const { data, error } = await supabase
                    .from('players')
                    .select('*')
                    .eq('game_code', currentGameCode);
                
                if (error) return;
                
                const playersDiv = document.getElementById('players');
                
                if (data.length === 0) {
                    playersDiv.innerHTML = '<p>👤 Ожидание игроков...</p>';
                } else {
                    playersDiv.innerHTML = data.map(p => 
                        `<div class="player">👤 ${p.name} | 🎯 ${p.score || 0}</div>`
                    ).join('');
                }
            } catch (e) {
                console.error('Error:', e);
            }
        }
    </script>
</body>
</html>
